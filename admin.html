<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sentinel — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');
  :root{
    --bg:#080a0d;--panel:#0e1117;--border:#1a1f28;--border2:#242b36;
    --accent:#00e5ff;--danger:#ff3b3b;--warn:#ffb020;--ok:#00d084;
    --text:#e2e8f0;--muted:#4a5568;
    --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:.05em}
  .logo svg{width:20px;height:20px}
  .admin-badge{background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3);color:var(--warn);padding:3px 9px;border-radius:5px;font-size:10px;font-family:var(--mono);font-weight:600;letter-spacing:.07em}
  .hright{display:flex;align-items:center;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:var(--accent);color:#000}.btn-primary:hover{filter:brightness(1.1)}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}.btn-ghost:hover{background:var(--border2)}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:rgba(255,59,59,.1)}
  .btn-sm{padding:5px 10px;font-size:11px}

  main{flex:1;padding:22px;display:flex;flex-direction:column;gap:20px;max-width:1100px;margin:0 auto;width:100%}

  /* Stat bar */
  .stats{display:flex;gap:10px}
  .stat{flex:1;padding:13px 15px;border-radius:9px;background:var(--panel);border:1px solid var(--border)}
  .stat-v{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1}
  .stat-v.c{color:var(--accent)}.stat-v.o{color:var(--ok)}.stat-v.d{color:var(--danger)}.stat-v.w{color:var(--warn)}
  .stat-l{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

  /* Section */
  .section{background:var(--panel);border:1px solid var(--border);border-radius:11px;overflow:hidden}
  .sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
  .sec-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
  .badge-count{background:var(--border2);border-radius:10px;padding:1px 8px;font-size:11px;font-family:var(--mono);color:var(--muted)}

  /* Table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 18px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
  td{padding:11px 18px;font-size:13px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);font-weight:600;letter-spacing:.04em}
  .tag.ok{background:rgba(0,208,132,.12);color:var(--ok);border:1px solid rgba(0,208,132,.2)}
  .tag.off{background:var(--border);color:var(--muted);border:1px solid var(--border2)}
  .tag.tg{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2)}
  .actions{display:flex;gap:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border2);border-radius:13px;width:440px;max-width:94vw;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal h2{font-size:16px;margin-bottom:18px}
  .fg{margin-bottom:12px}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
  input[type=text],input[type=password]{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;transition:border .15s}
  input:focus{border-color:var(--accent)}
  .mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  .hint{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border2);border-radius:7px;padding:9px 16px;font-size:12px;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;z-index:999;pointer-events:none}
  #toast.show{opacity:1}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="3" x2="12" y2="1"/><line x1="12" y1="23" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="1" y2="12"/><line x1="23" y1="12" x2="21" y2="12"/>
    </svg>
    SENTINEL
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="hright">
    <button class="btn btn-primary" onclick="openNewClient()">+ New Client</button>
    <button class="btn btn-ghost" onclick="logout()">Sign out</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-v c" id="sClients">0</div><div class="stat-l">Clients</div></div>
    <div class="stat"><div class="stat-v o" id="sCams">0</div><div class="stat-l">Total Cameras</div></div>
    <div class="stat"><div class="stat-v w" id="sActive">0</div><div class="stat-l">Active Streams</div></div>
    <div class="stat"><div class="stat-v d" id="sAlerts">0</div><div class="stat-l">Alerts Today</div></div>
  </div>

  <!-- Clients table -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">Clients <span class="badge-count" id="clientCount">0</span></div>
      <button class="btn btn-primary btn-sm" onclick="openNewClient()">+ New Client</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Username</th><th>Cameras</th><th>Telegram</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="clientTable"></tbody>
    </table>
  </div>

  <!-- All cameras -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">All Cameras <span class="badge-count" id="camCount">0</span></div>
    </div>
    <table>
      <thead>
        <tr><th>Camera</th><th>Client</th><th>Status</th><th>Detections</th><th>Actions</th></tr>
      </thead>
      <tbody id="camTable"></tbody>
    </table>
  </div>
</main>

<!-- New / Edit Client Modal -->
<div class="overlay" id="clientModal">
  <div class="modal">
    <h2 id="modalTitle">New Client</h2>
    <div class="fg"><label>Full Name</label><input type="text" id="cName" placeholder="Acme Corp / John Doe"/></div>
    <div class="fg"><label>Username</label><input type="text" id="cUser" placeholder="acme_corp"/></div>
    <div class="fg"><label>Password</label><input type="password" id="cPass" placeholder="Strong password…"/></div>
    <hr class="divider"/>
    <p class="hint">Telegram credentials for this client's alerts (they can also set these themselves).</p>
    <div class="fg"><label>Telegram Bot Token</label><input type="text" id="cTgTok" placeholder="123456:ABC-…"/></div>
    <div class="fg"><label>Telegram Chat ID</label><input type="text" id="cTgChat" placeholder="-100xxxxxxxxxx"/></div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveClientBtn" onclick="saveClient()">Create Client</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API   = localStorage.getItem("sentinel_api") || "https://YOUR-BACKEND.onrender.com";
const TOKEN = localStorage.getItem("sentinel_token");
const ROLE  = localStorage.getItem("sentinel_role");
if (!TOKEN || ROLE !== "admin") location.href = "index.html";
const H = { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" };

let editingId = null;
let allClients = [];
let allCams = [];
let alertCount = 0;
let prevDets = {};

async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(API + path, { headers: H, ...opts });
    return r.json();
  } catch { return null; }
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function load() {
  const [clients, cams] = await Promise.all([
    apiFetch("/api/admin/clients"),
    apiFetch("/api/cameras"),
  ]);
  if (clients) { allClients = clients; renderClients(); }
  if (cams)    {
    // check alerts
    cams.forEach(c => {
      const dets = c.status?.detections || [];
      const prev = prevDets[c.id] || [];
      if (dets.length && JSON.stringify(dets) !== JSON.stringify(prev)) alertCount++;
      prevDets[c.id] = dets;
    });
    allCams = cams;
    renderCams();
  }
  updateStats();
}

function updateStats() {
  document.getElementById("sClients").textContent = allClients.filter(c=>c.id!=="admin").length;
  document.getElementById("sCams").textContent    = allCams.length;
  document.getElementById("sActive").textContent  = allCams.filter(c=>c.active).length;
  document.getElementById("sAlerts").textContent  = alertCount;
}

// ── Render clients ────────────────────────────────────────────────────────────
function renderClients() {
  const tb = document.getElementById("clientTable");
  document.getElementById("clientCount").textContent = allClients.filter(c=>c.id!=="admin").length;
  tb.innerHTML = "";
  allClients.forEach(c => {
    if (c.role === "admin") return;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${c.name}</strong></td>
      <td style="font-family:var(--mono);color:var(--muted)">${c.username}</td>
      <td>${c.cam_count}</td>
      <td>${c.telegram_ok ? '<span class="tag tg">✓ Set</span>' : '<span class="tag off">Not set</span>'}</td>
      <td>${c.active ? '<span class="tag ok">Active</span>' : '<span class="tag off">Suspended</span>'}</td>
      <td><div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="editClient('${c.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleClient('${c.id}', ${c.active})">
          ${c.active ? "Suspend" : "Activate"}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')">Delete</button>
      </div></td>`;
    tb.appendChild(tr);
  });
}

// ── Render cams ───────────────────────────────────────────────────────────────
function renderCams() {
  const tb = document.getElementById("camTable");
  document.getElementById("camCount").textContent = allCams.length;
  tb.innerHTML = "";
  allCams.forEach(c => {
    const dets = c.status?.detections || [];
    const client = allClients.find(cl => cl.id === c.client_id);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${c.name}</strong></td>
      <td style="color:var(--muted)">${client?.name || c.client_id}</td>
      <td>${c.active ? '<span class="tag ok">Live</span>' : '<span class="tag off">Paused</span>'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:${dets.length?'var(--danger)':'var(--muted)'}">${dets.join(", ")||"Clear"}</td>
      <td><div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleCamAdmin('${c.id}')">Toggle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCamAdmin('${c.id}')">Remove</button>
      </div></td>`;
    tb.appendChild(tr);
  });
}

// ── Client CRUD ───────────────────────────────────────────────────────────────
function openNewClient() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "New Client";
  document.getElementById("saveClientBtn").textContent = "Create Client";
  ["cName","cUser","cPass","cTgTok","cTgChat"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("clientModal").classList.add("open");
}

function editClient(id) {
  const c = allClients.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById("modalTitle").textContent = "Edit Client";
  document.getElementById("saveClientBtn").textContent = "Save Changes";
  document.getElementById("cName").value = c.name;
  document.getElementById("cUser").value = c.username;
  document.getElementById("cPass").value = "";
  // fetch full settings for telegram
  apiFetch(`/api/admin/clients`).then(list => {
    // telegram fields stored on client; shown in edit as empty (security)
    document.getElementById("cTgTok").value  = "";
    document.getElementById("cTgChat").value = "";
  });
  document.getElementById("clientModal").classList.add("open");
}

function closeModal() { document.getElementById("clientModal").classList.remove("open"); }
document.getElementById("clientModal").addEventListener("click", e => {
  if (e.target === document.getElementById("clientModal")) closeModal();
});

async function saveClient() {
  const body = {
    name:           document.getElementById("cName").value.trim(),
    username:       document.getElementById("cUser").value.trim(),
    password:       document.getElementById("cPass").value.trim(),
    telegram_token: document.getElementById("cTgTok").value.trim(),
    telegram_chat_id: document.getElementById("cTgChat").value.trim(),
  };
  if (!body.name) { toast("Enter a name"); return; }

  let r;
  if (editingId) {
    r = await apiFetch(`/api/admin/clients/${editingId}`, { method:"PUT", body:JSON.stringify(body) });
  } else {
    if (!body.username || !body.password) { toast("Username and password required"); return; }
    r = await apiFetch("/api/admin/clients", { method:"POST", body:JSON.stringify(body) });
  }
  if (!r) return;
  if (r.error) { toast("❌ " + r.error); return; }
  closeModal();
  toast(editingId ? "✅ Client updated" : `✅ Client "${body.name}" created`);
  load();
}

async function toggleClient(id, active) {
  await apiFetch(`/api/admin/clients/${id}`, { method:"PUT", body:JSON.stringify({active:!active}) });
  toast(active ? "Client suspended" : "Client activated");
  load();
}

async function deleteClient(id) {
  if (!confirm("Delete this client and all their cameras?")) return;
  await apiFetch(`/api/admin/clients/${id}`, { method:"DELETE" });
  toast("Client deleted");
  load();
}

async function toggleCamAdmin(id) {
  await apiFetch(`/api/cameras/${id}/toggle`, { method:"POST" });
  load();
}

async function deleteCamAdmin(id) {
  await apiFetch(`/api/cameras/${id}`, { method:"DELETE" });
  toast("Camera removed");
  load();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function toast(msg, ms=2800) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), ms);
}

function logout() {
  apiFetch("/api/logout", { method:"POST" });
  localStorage.removeItem("sentinel_token");
  localStorage.removeItem("sentinel_role");
  location.href = "index.html";
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
